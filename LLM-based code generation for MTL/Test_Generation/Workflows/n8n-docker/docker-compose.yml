services:
  n8n-test-generation:
    image: n8nio/n8n:latest
    container_name: n8n-test-generation
    ports:
      - "5679:5678"
    environment:
      - GENERIC_TIMEZONE=Europe/Berlin
      - TZ=Europe/Berlin
      - N8N_SECURE_COOKIE=false
    volumes:
      # Keep this test-generation n8n instance separate from the baseline n8n.
      - n8n_test_generation_data:/home/node/.n8n

      # Test-generation workflow workspace.
      - "./workflows:/data/workflows"
      - "./mtl_snippets:/data/snippets"
      - "./few_shot_examples:/data/examples"
      - "./grammar:/data/grammar"
      - "./models:/data/models"

      # Baseline ETL artifacts used as read-only prompt context.
      - "../../../ETL_Test/src/test/resources:/data/baseline/ETL_Test/resources:ro"
      - "../../../ETL_Parser/src/main/resources:/data/baseline/ETL_Parser/resources:ro"

volumes:
  n8n_test_generation_data:

